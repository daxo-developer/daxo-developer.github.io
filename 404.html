<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 · Daxo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0a0e14;
            color: #d4d4d4;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            padding: 20px;
        }
        .error-box {
            max-width: 540px;
        }
        .error-code {
            font-size: 4rem;
            font-weight: 300;
            color: #00d4a0;
        }
        .error-desc {
            font-size: 1.2rem;
            color: #8899aa;
            margin: 16px 0 24px;
        }
        .error-box a {
            color: #00d4a0;
            text-decoration: none;
            border-bottom: 1px solid rgba(0,212,160,0.3);
            padding-bottom: 2px;
        }
        .error-box a:hover {
            color: #66f0cc;
            border-bottom-color: #66f0cc;
        }
    </style>
</head>
<body>
    <div class="error-box">
        <div class="error-code">404</div>
        <p class="error-desc">Page not found in this address space.</p>
        <p><a href="/">↩ return to daxo-developer.github.io</a></p>
    </div>
</body>
</html>
